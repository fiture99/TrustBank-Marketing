kind = "web"
previewPath = "/"
title = "Trust Bank Marketing & Sales Suite"
version = "1.0.0"
id = "artifacts/trust-bank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20752

[services.development]
run = "pnpm --filter @workspace/trust-bank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trust-bank", "run", "build" ]
publicDir = "artifacts/trust-bank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20752"
BASE_PATH = "/"
