openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Trust Bank Marketing & Sales Suite API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: users
  - name: campaigns
  - name: leads
  - name: interactions
  - name: deals
  - name: notifications
  - name: dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all team members
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the current acting user (demo user switcher)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: setCurrentUser
      tags: [users]
      summary: Switch current acting user (demo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCurrentUserBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns (optionally filter by channel/status)
      parameters:
        - in: query
          name: channel
          schema: { type: string, enum: [digital, sms, email, branch] }
        - in: query
          name: status
          schema: { type: string, enum: [active, paused, ended] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads
      parameters:
        - in: query
          name: stage
          schema: { type: string, enum: [new, contacted, qualified, converted, lost] }
        - in: query
          name: assignedToId
          schema: { type: integer }
        - in: query
          name: campaignId
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
    patch:
      operationId: updateLead
      tags: [leads]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /interactions:
    get:
      operationId: listInteractions
      tags: [interactions]
      parameters:
        - in: query
          name: leadId
          schema: { type: integer }
        - in: query
          name: salesOfficerId
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Interaction"
    post:
      operationId: createInteraction
      tags: [interactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInteractionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"
  /interactions/follow-ups-due:
    get:
      operationId: listFollowUpsDue
      tags: [interactions]
      summary: Follow-ups due today or overdue (red flags)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FollowUpItem"

  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      parameters:
        - in: query
          name: stage
          schema: { type: string, enum: [prospect, negotiation, won, lost] }
        - in: query
          name: salesOfficerId
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"
    post:
      operationId: createDeal
      tags: [deals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDealBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
  /deals/{id}:
    patch:
      operationId: updateDeal
      tags: [deals]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDealBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
  /deals/pipeline:
    get:
      operationId: getDealPipeline
      tags: [deals]
      summary: Pipeline summary by stage
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealPipeline"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      parameters:
        - in: query
          name: channel
          schema: { type: string, enum: [sms, email, in_app] }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
  /notifications/send:
    post:
      operationId: sendNotification
      tags: [notifications]
      summary: Send a single or bulk notification (simulated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendNotificationResult"
  /notifications/inbox:
    get:
      operationId: listInboxAlerts
      tags: [notifications]
      summary: In-app alerts for the current acting user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxAlert"
  /notifications/inbox/{id}/read:
    post:
      operationId: markInboxAlertRead
      tags: [notifications]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxAlert"
  /notifications/templates:
    get:
      operationId: listNotificationTemplates
      tags: [notifications]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationTemplate"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Headline metrics for marketing dashboard
      parameters:
        - in: query
          name: channel
          schema: { type: string, enum: [digital, sms, email, branch] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /dashboard/channel-breakdown:
    get:
      operationId: getChannelBreakdown
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelBreakdown"
  /dashboard/monthly-trend:
    get:
      operationId: getMonthlyTrend
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrendPoint"
  /dashboard/funnel:
    get:
      operationId: getFunnel
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Funnel"
  /dashboard/team-activity:
    get:
      operationId: getTeamActivity
      tags: [dashboard]
      summary: This-month activity counts per staff member
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamActivityRow"
  /dashboard/revenue:
    get:
      operationId: getRevenueOverview
      tags: [dashboard]
      summary: Revenue closed plus deal counts for management view
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueOverview"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [marketing, sales, manager] }
        avatarColor: { type: string }
      required: [id, name, email, role, avatarColor]
    SetCurrentUserBody:
      type: object
      properties:
        userId: { type: integer }
      required: [userId]

    Campaign:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        channel: { type: string, enum: [digital, sms, email, branch] }
        startDate: { type: string }
        endDate: { type: string, nullable: true }
        budget: { type: number }
        spent: { type: number }
        status: { type: string, enum: [active, paused, ended] }
        targetAudience: { type: string }
        ownerId: { type: integer }
        ownerName: { type: string }
        leadsGenerated: { type: integer }
        conversions: { type: integer }
      required: [id, name, channel, startDate, budget, spent, status, targetAudience, ownerId, ownerName, leadsGenerated, conversions]
    CreateCampaignBody:
      type: object
      properties:
        name: { type: string }
        channel: { type: string, enum: [digital, sms, email, branch] }
        startDate: { type: string }
        endDate: { type: string, nullable: true }
        budget: { type: number }
        targetAudience: { type: string }
        status: { type: string, enum: [active, paused, ended] }
      required: [name, channel, startDate, budget, targetAudience, status]
    UpdateCampaignBody:
      type: object
      properties:
        name: { type: string }
        channel: { type: string, enum: [digital, sms, email, branch] }
        endDate: { type: string, nullable: true }
        budget: { type: number }
        spent: { type: number }
        status: { type: string, enum: [active, paused, ended] }
        targetAudience: { type: string }

    Lead:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        email: { type: string, nullable: true }
        productInterest: { type: string }
        source: { type: string }
        campaignId: { type: integer, nullable: true }
        campaignName: { type: string, nullable: true }
        assignedToId: { type: integer, nullable: true }
        assignedToName: { type: string, nullable: true }
        stage: { type: string, enum: [new, contacted, qualified, converted, lost] }
        createdAt: { type: string }
      required: [id, name, phone, productInterest, source, stage, createdAt]
    LeadDetail:
      allOf:
        - $ref: "#/components/schemas/Lead"
        - type: object
          properties:
            interactions:
              type: array
              items:
                $ref: "#/components/schemas/Interaction"
          required: [interactions]
    CreateLeadBody:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string, nullable: true }
        productInterest: { type: string }
        source: { type: string }
        campaignId: { type: integer, nullable: true }
        assignedToId: { type: integer, nullable: true }
      required: [name, phone, productInterest, source]
    UpdateLeadBody:
      type: object
      properties:
        stage: { type: string, enum: [new, contacted, qualified, converted, lost] }
        assignedToId: { type: integer, nullable: true }
        productInterest: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string }
        name: { type: string }

    Interaction:
      type: object
      properties:
        id: { type: integer }
        leadId: { type: integer }
        leadName: { type: string }
        type: { type: string, enum: [call, meeting, branch_visit, sms, email] }
        notes: { type: string }
        salesOfficerId: { type: integer }
        salesOfficerName: { type: string }
        nextFollowUp: { type: string, nullable: true }
        createdAt: { type: string }
      required: [id, leadId, leadName, type, notes, salesOfficerId, salesOfficerName, createdAt]
    CreateInteractionBody:
      type: object
      properties:
        leadId: { type: integer }
        type: { type: string, enum: [call, meeting, branch_visit, sms, email] }
        notes: { type: string }
        nextFollowUp: { type: string, nullable: true }
      required: [leadId, type, notes]
    FollowUpItem:
      type: object
      properties:
        interactionId: { type: integer }
        leadId: { type: integer }
        leadName: { type: string }
        leadPhone: { type: string }
        salesOfficerId: { type: integer }
        salesOfficerName: { type: string }
        nextFollowUp: { type: string }
        daysOverdue: { type: integer }
        notes: { type: string }
      required: [interactionId, leadId, leadName, leadPhone, salesOfficerId, salesOfficerName, nextFollowUp, daysOverdue, notes]

    Deal:
      type: object
      properties:
        id: { type: integer }
        customerName: { type: string }
        customerPhone: { type: string }
        productType: { type: string }
        value: { type: number }
        stage: { type: string, enum: [prospect, negotiation, won, lost] }
        expectedCloseDate: { type: string }
        salesOfficerId: { type: integer }
        salesOfficerName: { type: string }
        leadId: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string }
      required: [id, customerName, customerPhone, productType, value, stage, expectedCloseDate, salesOfficerId, salesOfficerName, createdAt]
    CreateDealBody:
      type: object
      properties:
        customerName: { type: string }
        customerPhone: { type: string }
        productType: { type: string }
        value: { type: number }
        stage: { type: string, enum: [prospect, negotiation, won, lost] }
        expectedCloseDate: { type: string }
        leadId: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
      required: [customerName, customerPhone, productType, value, stage, expectedCloseDate]
    UpdateDealBody:
      type: object
      properties:
        stage: { type: string, enum: [prospect, negotiation, won, lost] }
        value: { type: number }
        expectedCloseDate: { type: string }
        notes: { type: string, nullable: true }
    DealPipeline:
      type: object
      properties:
        stages:
          type: array
          items:
            type: object
            properties:
              stage: { type: string }
              count: { type: integer }
              totalValue: { type: number }
            required: [stage, count, totalValue]
        totalValue: { type: number }
        winRate: { type: number }
        closedThisQuarter: { type: integer }
      required: [stages, totalValue, winRate, closedThisQuarter]

    Notification:
      type: object
      properties:
        id: { type: integer }
        channel: { type: string, enum: [sms, email, in_app] }
        recipient: { type: string }
        subject: { type: string, nullable: true }
        message: { type: string }
        status: { type: string, enum: [queued, sent, delivered, failed] }
        recipientCount: { type: integer }
        sentByName: { type: string }
        campaignName: { type: string, nullable: true }
        createdAt: { type: string }
      required: [id, channel, recipient, message, status, recipientCount, sentByName, createdAt]
    SendNotificationBody:
      type: object
      properties:
        channel: { type: string, enum: [sms, email, in_app] }
        audience: { type: string, enum: [all_customers, account_holders, loan_clients, business_customers, staff, custom] }
        recipients:
          type: array
          items: { type: string }
          nullable: true
        subject: { type: string, nullable: true }
        message: { type: string }
        campaignId: { type: integer, nullable: true }
      required: [channel, audience, message]
    SendNotificationResult:
      type: object
      properties:
        notification:
          $ref: "#/components/schemas/Notification"
        deliveredCount: { type: integer }
      required: [notification, deliveredCount]
    InboxAlert:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        body: { type: string }
        category: { type: string, enum: [new_lead, follow_up, campaign, deal, system] }
        read: { type: boolean }
        createdAt: { type: string }
      required: [id, title, body, category, read, createdAt]
    NotificationTemplate:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        channel: { type: string, enum: [sms, email, in_app] }
        subject: { type: string, nullable: true }
        body: { type: string }
      required: [id, name, channel, body]

    DashboardSummary:
      type: object
      properties:
        totalLeads: { type: integer }
        leadsDelta: { type: number }
        conversions: { type: integer }
        conversionsDelta: { type: number }
        conversionRate: { type: number }
        conversionRateDelta: { type: number }
        campaignsTotal: { type: integer }
        campaignsActive: { type: integer }
        budgetTotal: { type: number }
        budgetSpent: { type: number }
        budgetUsedPct: { type: number }
      required: [totalLeads, conversions, conversionRate, campaignsTotal, campaignsActive, budgetTotal, budgetSpent, budgetUsedPct, leadsDelta, conversionsDelta, conversionRateDelta]
    ChannelBreakdown:
      type: object
      properties:
        channel: { type: string, enum: [digital, sms, email, branch] }
        leads: { type: integer }
        conversions: { type: integer }
        conversionRate: { type: number }
        budgetUsedPct: { type: number }
        budget: { type: number }
        spent: { type: number }
      required: [channel, leads, conversions, conversionRate, budgetUsedPct, budget, spent]
    MonthlyTrendPoint:
      type: object
      properties:
        month: { type: string }
        leads: { type: integer }
        conversions: { type: integer }
      required: [month, leads, conversions]
    Funnel:
      type: object
      properties:
        impressions: { type: integer }
        clicks: { type: integer }
        leads: { type: integer }
        conversions: { type: integer }
      required: [impressions, clicks, leads, conversions]
    TeamActivityRow:
      type: object
      properties:
        userId: { type: integer }
        name: { type: string }
        role: { type: string, enum: [marketing, sales, manager] }
        campaignsCount: { type: integer }
        interactionsCount: { type: integer }
        leadsCount: { type: integer }
        dealsCount: { type: integer }
      required: [userId, name, role, campaignsCount, interactionsCount, leadsCount, dealsCount]
    RevenueOverview:
      type: object
      properties:
        revenueClosedQuarter: { type: number }
        dealsInPipeline: { type: integer }
        revenueByMonth:
          type: array
          items:
            type: object
            properties:
              month: { type: string }
              revenue: { type: number }
            required: [month, revenue]
      required: [revenueClosedQuarter, dealsInPipeline, revenueByMonth]
